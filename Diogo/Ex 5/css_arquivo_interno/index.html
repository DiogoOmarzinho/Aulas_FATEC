<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estilo InLine</title>
    <style> 
        h1{
            color:rgb(227, 175, 19);
            font-size: 20px;
        }

        p {
            background: yellowgreen;
            text-align: right;
        }

        .autor {
            color: red;
            font-size: 20px;


        }

        #conteudo{
            background: gray;
            color: azure;
            font-size: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>CSS InLine</h1>
    
    <p>
        Estamos utilizando o CSS no modo incline
    <p>
        <p class="autor">
            Autor: John Doe
        </p>
</body>
</html>
